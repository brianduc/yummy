                    - text: – YummyCode (self‑hosted TUI + Web), a web portal for business users, and any MCP‑capable IDE (VS Code, Cursor, JetBrains).
                    - text: "2."
                    - strong [ref=e2376]: yummy‑hub
                    - text: – API Gateway handling authentication, routing, rate limiting, audit logs, and session management.
                    - text: "3."
                    - strong [ref=e2377]: AI Agent Mesh
                    - text: "– Six specialized agents:"
                    - text: "-"
                    - emphasis [ref=e2378]: yummy‑po
                    - text: – Generates user stories, prioritizes backlog, creates GitHub Issues.
                    - text: "-"
                    - emphasis [ref=e2379]: yummy‑ba
                    - text: – Converts codebase to BRD, finds implementation gaps, generates sequence diagrams.
                    - text: "-"
                    - emphasis [ref=e2380]: yummy‑scrum
                    - text: – Plans sprints, auto‑reports burndown/standups, detects blockers.
                    - text: "-"
                    - emphasis [ref=e2381]: yummy‑dev
                    - text: – Code generation, PR review, refactoring, onboarding explanation.
                    - text: "-"
                    - emphasis [ref=e2382]: yummy‑qa
                    - text: – Test case generation, coverage gap checks, E2E scripts.
                    - text: "-"
                    - emphasis [ref=e2383]: yummy‑guard
                    - text: – Secret scanning, CVE checks, policy enforcement, prompt safety.
                    - text: "4."
                    - strong [ref=e2384]: yummy‑mcp
                    - text: "– The critical integration layer: an MCP server that exposes each agent’s capability as MCP"
                    - emphasis [ref=e2385]: tools
