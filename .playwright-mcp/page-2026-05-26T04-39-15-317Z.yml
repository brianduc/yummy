                  - paragraph [ref=e2372]:
                    - text: The document outlines a
                    - strong [ref=e2373]: multi‑agent SDLC platform
                    - text: "where each agent (PO, BA, Scrum Master, Developer, QA, Security) is a separate AI service exposed via MCP tools/resources. Key logical components:"
                  - paragraph [ref=e2374]:
                    - text: "1."
