                    - code [ref=e2386]: create_user_story
                    - text: ","
                    - code [ref=e2387]: review_pr
                    - text: ),
                    - emphasis [ref=e2388]: resources
                    - text: (read‑only data like backlog, codebase summary), and
                    - emphasis [ref=e2389]: prompts
                    - text: (templates for user story creation, PR review). Implementation uses Python MCP SDK with HTTP/SSE transport.
                    - text: "5."
                    - strong [ref=e2390]: Core Backend
                    - text: –
                    - code [ref=e2391]: yummy-core
                    - text: (FastAPI REST API orchestrating agents),
                    - code [ref=e2392]: yummy-rag
                    - text: (RAG engine with pgvector for code/doc embeddings),
                    - code [ref=e2393]: yummy-collab
                    - text: (WebSocket for real‑time collaboration and notifications).
