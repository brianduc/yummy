              - text: "| Method | Path | Description | |--------|---------------------|--------------------------------------| | POST | /sessions | Create new session | | GET | /sessions | List all sessions | | GET | /sessions/:id | Get session details | | DELETE | /sessions/:id | Delete session | | POST | /sessions/:id/reset | Reset session state |"
              - heading "Configuration" [level=3] [ref=e320]
              - text: "| Method | Path | Description | |--------|--------------------------|----------------------------------| | POST | /config/provider | Switch active AI provider | | POST | /config/api-key | Set Gemini API key | | POST | /config/openai | Set OpenAI key/model | | POST | /config/ollama | Set Ollama endpoint/model | | POST | /config/bedrock | Set AWS Bedrock region/model | | POST | /config/copilot | Set GitHub Copilot settings | | POST | /config/setup | Parse GitHub repo URL, save | | GET | /config/status | Returns all config, KB stats, scan status, sessions/cost metrics |"
