              - heading "PROJECT SUMMARY — YUMMY" [level=1] [ref=e254]
              - heading "Introduction" [level=2] [ref=e255]
              - strong [ref=e256]: YUMMY
              - text: is an AI-native, multi-agent SDLC (Software Development Lifecycle) platform. It provides an intelligent assistant that guides teams through the entire software development process—from business case intake and requirements analysis, through design, development, security, QA, and operations. The platform is IDE-agnostic, integrates via the Model Context Protocol (MCP), and offers both a web-based workspace (Next.js frontend) and REST APIs.
              - paragraph [ref=e257]: "The project consists of:"
              - listitem [ref=e258]:
                - strong [ref=e259]: Backend
                - text: (TypeScript port of original Python FastAPI) – Hono HTTP framework with SQLite persistence via Drizzle ORM.
              - listitem [ref=e260]:
                - strong [ref=e261]: Frontend
                - text: – Next.js 16 with React 19, custom theming, and real-time streaming (SSE).
              - listitem [ref=e262]:
                - strong [ref=e263]: AI Agent Mesh
                - text: – Specialized agents (BA, SA, Dev Lead, Dev, Security, QA, SRE) orchestrated through a configurable provider abstraction.
              - listitem [ref=e264]:
                - strong [ref=e265]: Knowledge Base
                - text: – Code indexing with chunking and summarization, stored in SQLite and served for RAG queries.
              - listitem [ref=e266]:
                - strong [ref=e267]: Infrastructure
                - text: – Docker support, AWS App Runner + Amplify deployment pattern, and MCP server for universal IDE integration.
              - paragraph [ref=e268]: "---"
              - heading "Core Components" [level=2] [ref=e269]
              - heading "Backend API (backend-ts/)" [level=3] [ref=e270]:
                - text: Backend API (
                - code [ref=e271]: backend-ts/
                - text: )
              - listitem [ref=e272]:
                - strong [ref=e273]: Framework
                - text: ": Hono v4 with"
                - code [ref=e274]: "@hono/zod-openapi"
                - text: for typed routes and OpenAPI 3.1.0 generation. Swagger UI at
                - code [ref=e275]: /docs
                - text: .
              - listitem [ref=e276]:
                - strong [ref=e277]: Database
                - text: ": SQLite via"
                - code [ref=e278]: better-sqlite3
                - text: + Drizzle ORM (migrations, schema inference, repositories).
              - listitem [ref=e279]:
                - strong [ref=e280]: Configuration
                - text: ": Two-tier – environment variables ("
                - code [ref=e281]: .env
                - text: ) provide defaults, SQLite
                - code [ref=e282]: provider_config
                - text: table overrides at runtime.
              - listitem [ref=e283]:
                - strong [ref=e284]: AI Dispatcher
                - text: ": Central module ("
                - code [ref=e285]: services/ai/dispatcher.ts
                - text: ) that selects the active provider (Gemini, OpenAI, Ollama, Copilot, Bedrock) and delegates to provider-specific implementations. Supports both blocking calls (
                - code [ref=e286]: callAI
                - text: ) and streaming (
                - code [ref=e287]: streamAI
                - text: ).
              - heading "Frontend (frontend/)" [level=3] [ref=e288]:
                - text: Frontend (
                - code [ref=e289]: frontend/
                - text: )
              - listitem [ref=e290]:
                - strong [ref=e291]: Workspace
                - text: ": Split-panel layout with left tabs (Chat, Sessions, Tracing, Settings) and right tabs (IDE, Node Graph, Wiki, Insights, RAG, SDLC, Backlog, DB)."
              - listitem [ref=e292]:
                - strong [ref=e293]: State Management
                - text: ": Client-side"
                - code [ref=e294]: useState
                - text: + polling (4s) for session/status, real-time SSE for SDLC and RAG streaming.
              - listitem [ref=e295]:
                - strong [ref=e296]: Theming
                - text: ": Dark theme with CSS custom properties, six themes (dark, light, dracula, yummy, angry, idea), persisted in"
                - code [ref=e297]: localStorage
