              - heading "Security Considerations" [level=2] [ref=e390]
              - listitem [ref=e391]:
                - strong [ref=e392]: Authentication
                - text: ": The current implementation"
                - strong [ref=e393]: does not include authentication
                - text: . The AWS deployment guide explicitly notes “no auth” as a known risk. Production use requires adding an auth layer (e.g., JWT, OAuth).
              - listitem [ref=e394]:
                - strong [ref=e395]: API Key Storage
                - text: ": AI provider keys can be set via environment variables or through the UI (persisted in SQLite). For AWS deployments, keys should be stored in"
                - strong [ref=e396]: AWS Secrets Manager
                - text: and injected as environment variables to the App Runner service.
              - listitem [ref=e397]:
                - strong [ref=e398]: CORS
                - text: ": Backend allows all origins, methods, and headers (matching the original Python FastAPI). For production, restrict to specific frontend domains."
              - listitem [ref=e399]:
                - strong [ref=e400]: HTTPS
                - text: ": Should be enforced via CloudFront or AWS Certificate Manager (ACM) when using custom domains."
              - listitem [ref=e401]:
                - strong [ref=e402]: Input Validation
                - text: ": All API requests are validated using Zod schemas (OpenAPI). SQL queries use parameterized ORM (no raw SQL injection risk)."
              - listitem [ref=e403]:
                - strong [ref=e404]: Environment Variables
                - text: ": Sensitive data (API keys, GitHub tokens) are read from"
                - code [ref=e405]: .env
                - text: at boot time. The
                - code [ref=e406]: env.ts
                - text: module validates the schema and exits on failure.
              - listitem [ref=e407]:
                - strong [ref=e408]: MCP Integration
                - text: ": The MCP server (optional) should follow security best practices for tool exposure, but the current implementation is internal to the platform."
              - paragraph [ref=e409]: "---"
