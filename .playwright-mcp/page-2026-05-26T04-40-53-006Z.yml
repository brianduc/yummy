              - text: "| Method | Path | Description | |--------|-------------------|------------------------------------| | GET | /kb | Get KB snapshot (tree, insights, summary) | | POST | /kb/scan | Trigger background repo scan | | GET | /kb/scan/status | Poll scan progress | | GET | /kb/file?path=... | Fetch file content from GitHub | | DELETE | /kb | Clear KB and scan status |"
              - heading "Ask (RAG)" [level=3] [ref=e322]
              - text: "| Method | Path | Description | |--------|---------------|--------------------------------------------------| | POST | /ask | SSE stream Q&A with KB context + history | | POST | /ask/free | SSE stream freeform chat (no KB) | | POST | /ask/sync | Non-streaming Q&A returning JSON result |"
              - heading "SDLC Pipeline" [level=3] [ref=e323]
              - text: "| Method | Path | Description | |--------|-----------------------------------|-----------------------------------------------| | POST | /sdlc/start | Start BA agent, returns"
              - code [ref=e324]: waiting_ba_approval
              - text: "| | POST | /sdlc/approve-ba | Approve BA, run SA/PM, returns backlog | | POST | /sdlc/approve-sa | Approve SA, run Dev Lead, waiting approval | | POST | /sdlc/approve-dev-lead | Approve Dev Lead, run Dev→Security→QA→SRE | | POST | /sdlc/:session_id/stop | Abort streaming, set state to"
              - code [ref=e325]: idle
              - text: "| | POST | /sdlc/:session_id/restore | Rollback to checkpoint (ba/sa/dev_lead) | | GET | /sdlc/:session_id/state | Current workflow state, outputs, backlog | | GET | /sdlc/:session_id/history | Chat history for this session | | POST | /sdlc/:session_id/export-prompt | Distill outputs into implementation prompt |"
              - heading "Metrics" [level=3] [ref=e326]
              - text: "| Method | Path | Description | |--------|-----------|----------------------------------------| | GET | /metrics | Aggregated usage (calls, cost, tokens) and last 50 logs | | DELETE | /metrics | Clear all request logs |"
