                - text: ), API client (
                - code [ref=e301]: api.ts
                - text: ), theme/UI-size persistence.
              - heading "AI Agent Mesh" [level=3] [ref=e302]
              - paragraph [ref=e303]:
                - text: "| Agent | Role |"
                - text: "|----------------|----------------------------------------------------------------------|"
                - text: "| BA | Converts business requirements to structured documents, gaps analysis |"
                - text: "| SA / PM | Solution architecture, risk assessment, JIRA backlog generation |"
                - text: "| Dev Lead | High-level design, task breakdown, code review |"
                - text: "| Dev | Code generation, refactoring |"
                - text: "| Security | Secret scanning, CVE checks, policy enforcement |"
                - text: "| QA | Test case generation, coverage analysis, E2E scripts |"
                - text: "| SRE | Deployment scripts, monitoring configuration |"
              - heading "Knowledge Base (KB) Engine" [level=3] [ref=e304]
              - listitem [ref=e305]:
                - strong [ref=e306]: Scanning
                - text: ": Fetches repo file tree from GitHub, groups files into ~35KB chunks, sends each chunk to an Indexer AI agent for summarization, then aggregates insights via an Architect agent to produce a project wiki."
