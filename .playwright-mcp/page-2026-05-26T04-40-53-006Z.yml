              - heading "Local Development" [level=3] [ref=e411]
              - generic [ref=e412]:
                - generic [ref=e413]: bash
                - code [ref=e415]: "# Backend (TypeScript) cd backend-ts pnpm install pnpm db:migrate pnpm dev # starts on port 8000 # Frontend cd frontend npm install npm run dev # starts on port 3000"
              - listitem [ref=e416]: Backend requires Node.js 20+ and SQLite.
              - listitem [ref=e417]: Frontend requires Node.js 18+.
              - listitem [ref=e418]:
                - text: Environment variables in
                - code [ref=e419]: .env
                - text: at backend root (see
                - code [ref=e420]: env.ts
                - text: for required fields).
              - heading "Docker" [level=3] [ref=e421]
              - paragraph [ref=e422]:
                - text: The project includes Docker support (not shown in summaries but implied by
                - code [ref=e423]: "output: 'standalone'"
                - text: in Next.js config and
                - code [ref=e424]: apprunner.yaml
                - text: "reference). Typical Docker Compose would include:"
              - listitem [ref=e425]:
                - code [ref=e426]: backend-ts
                - text: container (Hono server)
              - listitem [ref=e427]:
                - code [ref=e428]: frontend
                - text: container (Next.js standalone build)
              - heading "AWS Production (Recommended)" [level=3] [ref=e429]
              - paragraph [ref=e430]:
                - text: "1."
                - strong [ref=e431]: Backend
                - text: ": AWS App Runner from GitHub repository. Use"
                - code [ref=e432]: apprunner.yaml
                - text: to define build and runtime configuration. Environment variables (including API keys) should come from AWS Secrets Manager.
                - text: "2."
                - strong [ref=e433]: Frontend
                - text: ": AWS Amplify Hosting connected to the same repo. Build settings handle Next.js standalone output."
                - text: "3."
                - strong [ref=e434]: Custom Domains
                - text: ": Route 53 hosted zone → ACM certificate → App Runner custom domain + Amplify custom domain."
                - text: "4."
                - strong [ref=e435]: Smoke Tests
                - text: ": Verify health endpoint and frontend connectivity after deployment."
              - strong [ref=e436]: Known Risks
              - text: ":"
              - listitem [ref=e437]: SQLite is file-based; not suitable for multi-instance scaling. For high availability, migrate to PostgreSQL (e.g., via Drizzle adapter change).
              - listitem [ref=e438]: No authentication – must add before production use.
              - listitem [ref=e439]: "Costs: App Runner + Amplify incur charges; monitor usage."
              - strong [ref=e440]: Graduation Path
              - text: ": Move backend to ECS/Fargate with a PostgreSQL RDS instance and add proper auth (Cognito or similar)."
