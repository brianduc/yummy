# Local / server: backend + frontend (build on machine or in CI)
# Set NEXT_PUBLIC_API_URL to the URL browsers will use to reach the API (public URL).
#
# Example (split domains):
#   NEXT_PUBLIC_API_URL=https://api.example.com
#   CORS_ORIGINS=https://app.example.com
#
# Local persistence (MVP): everything lives under ${HOME}/.yummy/ on the host.
#   ${HOME}/.yummy/repos/        ← cloned repos + .gitnexus/lbug graphs
#   ${HOME}/.yummy/gitnexus-home ← gitnexus registry.json
#   ${HOME}/.yummy/pgdata        ← Postgres (pgvector) data dir
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: yummy
      POSTGRES_PASSWORD: yummy
      POSTGRES_DB: yummy
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${HOME}/.yummy/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yummy -d yummy"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      POSTGRES_URL: ${POSTGRES_URL:-postgres://yummy:yummy@postgres:5432/yummy}
      GITNEXUS_REPO_ROOT: /home/yummy/.yummy/repos
      GITNEXUS_HOME: /home/yummy/.yummy/gitnexus-home
      HOME: /home/yummy
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ${HOME}/.yummy:/home/yummy/.yummy:rw
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
