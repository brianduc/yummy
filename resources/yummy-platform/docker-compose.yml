version: "3.9"

services:
  # ── DATABASE ──
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: yummy
      POSTGRES_USER: yummy
      POSTGRES_PASSWORD: yummy
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yummy"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: [redisdata:/data]

  # ── AI (LOCAL) ──
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports: ["11434:11434"]
    volumes: [ollamadata:/root/.ollama]
    profiles: [local-ai]
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  # ── BACKEND ──
  yummy-backend:
    build:
      context: ./yummy-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://yummy:yummy@postgres:5432/yummy
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    env_file: [.env]
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_started}
    volumes:
      - ./yummy-backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── MCP SERVER ──
  yummy-mcp-server:
    build:
      context: ./yummy-mcp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports: ["3100:3100"]
    environment:
      YUMMY_API_URL: http://yummy-backend:8000
      MCP_TRANSPORT: sse
      PORT: "3100"
    env_file: [.env]
    depends_on: [yummy-backend]

  # ── FRONTEND ──
  yummy-frontend:
    build:
      context: ./yummy-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_MCP_URL: http://localhost:3100
    env_file: [.env]
    depends_on: [yummy-backend]

  # ── MONITORING ──
  grafana:
    image: grafana/grafana:latest
    ports: ["3050:3000"]
    volumes: [grafanadata:/var/lib/grafana]
    profiles: [monitoring]

volumes:
  pgdata:
  redisdata:
  ollamadata:
  grafanadata:
